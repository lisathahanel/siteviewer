<style>
body{
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:#e5e7eb;
  margin:0;
  padding:20px;
}
.container{
  max-width:1100px;
  margin:auto;
}
h2{
  text-align:center;
  margin-bottom:15px;
}
.top-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  margin-bottom:15px;
}
input[type=text]{
  flex:1;
  min-width:220px;
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:14px;
}
button.mode{
  background:#111827;
  border:1px solid #374151;
}
button.mode.active{
  background:#2563eb;
  border-color:#2563eb;
}
.viewer-wrap{
  margin-top:15px;
  display:flex;
  justify-content:center;
}
.device-frame{
  background:#000;
  border-radius:18px;
  padding:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
  position:relative;
}
.device-frame::before{
  content:"";
  position:absolute;
  top:6px;
  left:50%;
  transform:translateX(-50%);
  width:60px;
  height:4px;
  border-radius:999px;
  background:#111827;
}
iframe{
  border:none;
  background:white;
  border-radius:10px;
}
.info{
  margin-top:8px;
  text-align:center;
  font-size:13px;
  color:#9ca3af;
}


/* ===== FORCE DESKTOP LOOK ONLY ON PHONES + TABLETS ===== */
@media only screen and (max-width: 1024px) {

  html, body {
    overflow-x: hidden;
  }

  body {
    zoom: 0.38; /* safer than transform */
    transform-origin: top left;
  }

  #outer-wrapper,
  .main-wrapper,
  .content-wrapper {
    width: 100%;
    min-height: 100vh;
  }

  a, button {
    touch-action: manipulation;
  }
}

/* STRONGEST RESET TO BLOGGER DEFAULT (PHONES ONLY) */
@media only screen and (max-width: 768px) {

  .post-body,
  .page-body,
  .post-body *,
  .page-body * {
    all: revert !important;
  }

}

/* ======================= DESKTOP ONLY (1025px and above) ======================= */
@media only screen and (min-width: 1025px) {

/* --- Paragraphs styling --- */
.post-body p {
  font-size: 20px !important;
  line-height: 1.75em !important;
  color: #222 !important;
  font-family: "Arial", "Helvetica", sans-serif !important;
  max-width: 500px;
  margin: 0 auto 1em auto;
  padding: 0 15px;
  box-sizing: border-box;
  overflow: visible;
}

/* --- Drop Cap --- */
.post-body p:first-of-type::first-letter {
  float: left;
  font-size: 2.8em;
  line-height: 1;
  margin-right: 6px;
  font-weight: bold;
  color: #111;
  font-family: "Georgia", "Times New Roman", serif;
  display: inline-block;
  vertical-align: text-top;
}

/* --- Headings --- */
.post-body h1,
.post-body h2,
.post-body h3,
.post-body h4,
.post-body h5,
.post-body h6 {
  font-weight: 700 !important;
  color: #111 !important;
  line-height: 1.2em !important;
  margin-top: 1.5em;
  margin-bottom: 0.6em;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
  font-family: "Georgia", "Times New Roman", serif;
}

.post-body h1 { font-size: 36px !important; }
.post-body h2 { font-size: 28px !important; }
.post-body h3 { font-size: 22px !important; }

/* --- Paragraph spacing --- */
.post-body p + p {
  border-top: 1px solid #eee;
  padding-top: 0.6em;
  margin-top: 0.6em;
}

/* --- Blockquotes --- */
.post-body blockquote {
  border-left: 4px solid #ccc;
  padding-left: 18px;
  margin: 20px 0;
  font-style: italic;
  color: #555;
  background-color: #f9f9f9;
}

/* --- Images --- */
.post-body img {
  max-width: 100%;
  height: auto;
  margin: 15px 0;
  border-radius: 6px;
}

/* --- Lists --- */
.post-body ul,
.post-body ol {
  margin: 15px 0 20px 20px;
  line-height: 1.7em;
}

/* --- Buttons hover --- */
.post-body button:hover,
.post-body a.button:hover {
  background-color: #003366;
}

}
</style>

<script>
function normalizeUrl(url){
  url = url.trim();
  if(!url) return "";
  if(!/^https?:\/\//i.test(url)){
    url = "https://" + url;
  }
  return url;
}

function loadSite(){
  const input = document.getElementById("siteUrl");
  const frame = document.getElementById("previewFrame");
  const url = normalizeUrl(input.value);
  if(!url){
    alert("Please enter a URL");
    return;
  }
  frame.src = url;
}

function setMode(btn){
  const w = parseInt(btn.getAttribute("data-w"),10);
  const h = parseInt(btn.getAttribute("data-h"),10);
  const frame = document.getElementById("previewFrame");
  frame.width = w;
  frame.height = h;

  document.querySelectorAll("button.mode").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const label = btn.textContent.trim();
  document.getElementById("sizeInfo").textContent =
    `Current size: ${w} × ${h} (${label.replace(/^[^A-Za-z]+/,"")})`;
}
</script>
